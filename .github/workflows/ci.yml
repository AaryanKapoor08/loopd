name: CI

# Build + test the Rust engine and typecheck the TS SDK on every push to main
# and every PR. The release workflow (release.yml) is generated by cargo-dist and
# runs only on version tags — this is the fast feedback loop.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: cargo build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --verbose
      - run: cargo test --locked --verbose

  sdk:
    name: SDK typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      # The wire types in src/types/ are committed (regenerated by `prebuild`),
      # so the typecheck is self-contained and needs no Rust toolchain here.
      - run: npm run typecheck
